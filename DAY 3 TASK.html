<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
        }

        header{
            background:#333;
            color:white;
            padding:15px;
            display:flex;
            align-items:center;
        }

        header img{
            width:50px;
            margin-right:10px;
        }

        main{
            padding:20px;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:10px;
            position:fixed;
            bottom:0;
            width:100%;
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="Website Logo">
    <h1>My Website</h1>
</header>

<main>
    <h2>Welcome</h2>
    <p>This is a practice webpage with a header and footer.</p>
</main>

<footer>
    <p>© 2026 My Website | Contact: info@mywebsite.com</p>
</footer>

</body>
</html>
